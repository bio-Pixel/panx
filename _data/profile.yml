short_bio: >-
  <p>
    I am a Ph.D. candidate in Basic Medical Sciences at Tsinghua University, working at the interface of
    cancer systems biology, bioinformatics, and multi-omics analysis. My research focuses on understanding
    tumor ecosystem heterogeneity and microenvironment organization through integrative analysis of
    single-cell genomics, spatial transcriptomics, and proteomics.
  </p>
  <p>
    My work includes building high-resolution atlases of tumor vasculature at single-cell resolution (Nature, 2024),
    deciphering re-epithelialization programs in pancreatic ductal adenocarcinoma (Cancer Cell, in press),
    and identifying prognostic biomarkers through epigenomic and proteomic profiling. I am particularly
    interested in translating multi-omics insights into clinically relevant mechanisms that shape cancer
    progression and therapeutic response. Outside of academia, I love reading and exploring new frontiers
    in biomedical research.
  </p>
  <p>
    I am on the academic job market in the 2025 Fall cycle. Please feel free to reach out if you think
    I could be a good fit!
  </p>

