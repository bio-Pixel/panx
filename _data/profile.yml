short_bio: >-
  <p>
    I am a Ph.D. candidate in Basic Medical Sciences at Tsinghua University, working at the intersection of
    cancer systems biology, bioinformatics, and multi-omics analysis. My research focuses on elucidating
    tumor ecosystem heterogeneity and microenvironmental organization through the integrative analysis of
    single-cell genomics, spatial transcriptomics, and proteomics.
  </p>
  <p>
    My work includes constructing high-resolution atlases of tumor vasculature (Nature, 2024) and pancreatic
    cancer at single-cell resolution, uncovering metabolic dynamics before and after exercise in B-deficient
    mouse models (Cell, in press), and identifying cancer biomarkers through epigenomic and proteomic
    profiling. I am particularly interested in translating multi-omics discoveries into clinically
    actionable insights that inform cancer progression and therapeutic response. Outside of academia,
    I enjoy reading and exploring emerging frontiers in biomedical research.
  </p>
  <p>
    <strong>I will be on the academic job market in the Fall 2026 cycle. Please feel free to reach out if you think
    my background may be a good fit—I would be delighted to connect!</strong>
  </p>
  </p>

