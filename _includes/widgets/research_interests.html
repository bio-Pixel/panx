<!-- Research Interests Section -->
{% if site.data.display.homepage.show_research_interests %}
<div class="card shadow-sm mt-4">
    <div class="card-body">
        <h4 class="card-title mb-4">
            <i class="fas fa-flask mr-2"></i>Research Interests
        </h4>

        <div class="d-flex flex-wrap gap-2">
            <!-- Tag 1: 表观基因组 -->
            <a href="#epigenomics" class="text-decoration-none">
                <span class="badge badge-info text-white p-2" style="font-size: 0.9rem;">
                    <i class="fas fa-dna mr-1"></i>
                    表观基因组
                </span>
            </a>

            <!-- Tag 2: 肿瘤微环境 -->
            <a href="#microenvironment" class="text-decoration-none">
                <span class="badge badge-success text-white p-2" style="font-size: 0.9rem;">
                    <i class="fas fa-microscope mr-1"></i>
                    肿瘤微环境
                </span>
            </a>

            <!-- Tag 3: 单细胞 -->
            <a href="#singlecell" class="text-decoration-none">
                <span class="badge badge-warning text-white p-2" style="font-size: 0.9rem;">
                    <i class="fas fa-circle-nodes mr-1"></i>
                    单细胞
                </span>
            </a>

            <!-- Tag 4: 大数据 -->
            <a href="#bigdata" class="text-decoration-none">
                <span class="badge badge-primary text-white p-2" style="font-size: 0.9rem;">
                    <i class="fas fa-database mr-1"></i>
                    大数据
                </span>
            </a>
        </div>
    </div>
</div>
{% endif %}
