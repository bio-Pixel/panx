<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#2c3e50">Vascular Single Cell Atlas</text>

  <!-- Simulated UMAP plot -->
  <g transform="translate(50, 100)">
    <circle cx="100" cy="100" r="30" fill="#e74c3c" opacity="0.7"/>
    <circle cx="250" cy="150" r="40" fill="#3498db" opacity="0.7"/>
    <circle cx="400" cy="100" r="25" fill="#2ecc71" opacity="0.7"/>
    <circle cx="550" cy="200" r="35" fill="#f39c12" opacity="0.7"/>
    <circle cx="300" cy="250" r="20" fill="#9b59b6" opacity="0.7"/>
    <circle cx="500" cy="300" r="30" fill="#1abc9c" opacity="0.7"/>

    <!-- Labels -->
    <text x="100" y="110" text-anchor="middle" font-size="12" fill="white">EC1</text>
    <text x="250" y="160" text-anchor="middle" font-size="12" fill="white">EC2</text>
    <text x="400" y="110" text-anchor="middle" font-size="12" fill="white">EC3</text>
    <text x="550" y="210" text-anchor="middle" font-size="12" fill="white">EC4</text>
    <text x="300" y="260" text-anchor="middle" font-size="12" fill="white">EC5</text>
    <text x="500" y="310" text-anchor="middle" font-size="12" fill="white">EC6</text>

    <!-- Legend -->
    <rect x="20" y="350" width="560" height="100" fill="white" stroke="#ddd" rx="5"/>
    <text x="300" y="375" text-anchor="middle" font-size="14" fill="#2c3e50">Endothelial Cell Populations</text>
    <circle cx="50" cy="400" r="8" fill="#e74c3c"/>
    <text x="70" y="405" font-size="12" fill="#2c3e50">Arterial</text>
    <circle cx="150" cy="400" r="8" fill="#3498db"/>
    <text x="170" y="405" font-size="12" fill="#2c3e50">Venous</text>
    <circle cx="250" cy="400" r="8" fill="#2ecc71"/>
    <text x="270" y="405" font-size="12" fill="#2c3e50">Lymphatic</text>
    <circle cx="350" cy="400" r="8" fill="#f39c12"/>
    <text x="370" y="405" font-size="12" fill="#2c3e50">Tip</text>
    <circle cx="450" cy="400" r="8" fill="#9b59b6"/>
    <text x="470" y="405" font-size="12" fill="#2c3e50">Stalk</text>
    <circle cx="550" cy="400" r="8" fill="#1abc9c"/>
    <text x="570" y="405" font-size="12" fill="#2c3e50">Mature</text>
  </g>
</svg>