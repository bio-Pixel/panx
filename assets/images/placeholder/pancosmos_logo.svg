<svg width="300" height="100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="100" fill="#f8f9fa" stroke="#3498db" stroke-width="2" rx="5"/>

  <!-- Icon - network visualization -->
  <g transform="translate(50, 50)">
    <!-- Central node -->
    <circle cx="0" cy="0" r="15" fill="#3498db"/>
    <circle cx="0" cy="0" r="8" fill="white"/>

    <!-- Surrounding nodes -->
    <circle cx="-25" cy="-15" r="8" fill="#2ecc71"/>
    <circle cx="25" cy="-15" r="8" fill="#2ecc71"/>
    <circle cx="-25" cy="15" r="8" fill="#f39c12"/>
    <circle cx="25" cy="15" r="8" fill="#f39c12"/>

    <!-- Connections -->
    <line x1="0" y1="0" x2="-25" y2="-15" stroke="#bdc3c7" stroke-width="2"/>
    <line x1="0" y1="0" x2="25" y2="-15" stroke="#bdc3c7" stroke-width="2"/>
    <line x1="0" y1="0" x2="-25" y2="15" stroke="#bdc3c7" stroke-width="2"/>
    <line x1="0" y1="0" x2="25" y2="15" stroke="#bdc3c7" stroke-width="2"/>
  </g>

  <!-- Text -->
  <text x="100" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">PANCOSMOS</text>
  <text x="100" y="60" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">PDAC Ecosystem Atlas</text>
  <text x="100" y="80" font-family="Arial, sans-serif" font-size="10" fill="#3498db">Interactive Resource Platform</text>
</svg>