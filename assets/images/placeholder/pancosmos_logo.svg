<svg width="300" height="100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="100" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2" rx="5"/>

  <!-- Logo circle -->
  <circle cx="50" cy="50" r="30" fill="#3498db"/>

  <!-- Icon representation of a network/community -->
  <g transform="translate(50, 50)">
    <circle cx="0" cy="-10" r="4" fill="white"/>
    <circle cx="-10" cy="10" r="4" fill="white"/>
    <circle cx="10" cy="10" r="4" fill="white"/>
    <circle cx="0" cy="0" r="5" fill="white"/>
    <line x1="0" y1="-10" x2="0" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="0" x2="-10" y2="10" stroke="white" stroke-width="2"/>
    <line x1="0" y1="0" x2="10" y2="10" stroke="white" stroke-width="2"/>
  </g>

  <!-- Text -->
  <text x="100" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">PANCOSMOS</text>
  <text x="100" y="65" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">PDAC Ecosystem Atlas</text>

  <!-- Link indicator -->
  <text x="100" y="85" font-family="Arial, sans-serif" font-size="12" fill="#3498db">↗ Explore Resource</text>
</svg>