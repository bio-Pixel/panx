<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#2c3e50">
    Tumor Angiogenesis Schematic
  </text>

  <!-- Normal blood vessel -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="150" height="60" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="30"/>
    <text x="75" y="35" text-anchor="middle" font-size="14" fill="white">Normal Vessel</text>
  </g>

  <!-- Arrow -->
  <path d="M 250 180 L 350 180" stroke="#34495e" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Tumor -->
  <circle cx="450" cy="180" r="60" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="450" y="185" text-anchor="middle" font-size="14" fill="white">Tumor</text>

  <!-- New vessels forming -->
  <path d="M 400 180 Q 380 120, 350 100" stroke="#27ae60" stroke-width="3" fill="none"/>
  <path d="M 400 180 Q 420 120, 450 100" stroke="#27ae60" stroke-width="3" fill="none"/>
  <path d="M 400 180 Q 450 150, 500 140" stroke="#27ae60" stroke-width="3" fill="none"/>

  <!-- New vessel labels -->
  <circle cx="350" cy="100" r="20" fill="#27ae60"/>
  <text x="350" y="105" text-anchor="middle" font-size="12" fill="white">New</text>
  <circle cx="450" cy="100" r="20" fill="#27ae60"/>
  <text x="450" y="105" text-anchor="middle" font-size="12" fill="white">Vessel</text>

  <!-- Hypoxic region -->
  <ellipse cx="450" cy="180" rx="40" ry="40" fill="none" stroke="#e67e22" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="450" y="220" text-anchor="middle" font-size="12" fill="#e67e22">Hypoxic</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/>
    </marker>
  </defs>
</svg>