<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#2c3e50">Tumor Angiogenesis Mechanism</text>

  <!-- Normal blood vessel -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="150" height="60" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="30"/>
    <circle cx="75" cy="30" r="20" fill="white" opacity="0.3"/>
    <text x="75" y="35" text-anchor="middle" font-size="14" fill="white">Normal Vessel</text>
  </g>

  <!-- Arrow -->
  <path d="M 250 180 L 350 180" stroke="#34495e" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="300" y="170" text-anchor="middle" font-size="14" fill="#34495e">Hypoxia Signal</text>

  <!-- Tumor -->
  <circle cx="450" cy="180" r="60" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <circle cx="450" cy="180" r="40" fill="white" opacity="0.2"/>
  <text x="450" y="185" text-anchor="middle" font-size="14" fill="white">Tumor</text>

  <!-- VEGF secretion -->
  <g>
    <path d="M 450 180 Q 400 150, 350 120" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5"/>
    <circle cx="350" cy="120" r="15" fill="#e74c3c"/>
    <text x="350" y="125" text-anchor="middle" font-size="12" fill="white">VEGF</text>
  </g>

  <!-- New vessels forming -->
  <path d="M 450 180 Q 380 120, 350 100" stroke="#27ae60" stroke-width="3" fill="none"/>
  <path d="M 450 180 Q 520 120, 550 100" stroke="#27ae60" stroke-width="3" fill="none"/>
  <path d="M 450 180 Q 500 200, 550 220" stroke="#27ae60" stroke-width="3" fill="none"/>

  <!-- New vessels -->
  <g transform="translate(330, 80)">
    <ellipse cx="20" cy="20" rx="20" ry="10" fill="#27ae60" opacity="0.7"/>
    <circle cx="20" cy="20" r="5" fill="white" opacity="0.5"/>
    <text x="20" y="45" text-anchor="middle" font-size="12" fill="#2c3e50">New Vessel 1</text>
  </g>

  <g transform="translate(530, 80)">
    <ellipse cx="20" cy="20" rx="20" ry="10" fill="#27ae60" opacity="0.7"/>
    <circle cx="20" cy="20" r="5" fill="white" opacity="0.5"/>
    <text x="20" y="45" text-anchor="middle" font-size="12" fill="#2c3e50">New Vessel 2</text>
  </g>

  <g transform="translate(530, 200)">
    <ellipse cx="20" cy="20" rx="20" ry="10" fill="#27ae60" opacity="0.7"/>
    <circle cx="20" cy="20" r="5" fill="white" opacity="0.5"/>
    <text x="20" y="45" text-anchor="middle" font-size="12" fill="#2c3e50">New Vessel 3</text>
  </g>

  <!-- Angiogenic process steps -->
  <g transform="translate(100, 350)">
    <rect x="0" y="0" width="600" height="200" fill="white" stroke="#ddd" rx="10"/>
    <text x="300" y="30" text-anchor="middle" font-size="16" fill="#2c3e50">Angiogenic Process</text>

    <!-- Step 1 -->
    <circle cx="80" cy="80" r="30" fill="#3498db"/>
    <text x="80" y="85" text-anchor="middle" font-size="14" fill="white">1</text>
    <text x="80" y="120" text-anchor="middle" font-size="12" fill="#2c3e50">Hypoxia</text>

    <!-- Arrow -->
    <path d="M 110 80 L 170 80" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead-small)"/>

    <!-- Step 2 -->
    <circle cx="200" cy="80" r="30" fill="#e74c3c"/>
    <text x="200" y="85" text-anchor="middle" font-size="14" fill="white">2</text>
    <text x="200" y="120" text-anchor="middle" font-size="12" fill="#2c3e50">VEGF Secretion</text>

    <!-- Arrow -->
    <path d="M 230 80 L 290 80" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead-small)"/>

    <!-- Step 3 -->
    <circle cx="320" cy="80" r="30" fill="#f39c12"/>
    <text x="320" y="85" text-anchor="middle" font-size="14" fill="white">3</text>
    <text x="320" y="120" text-anchor="middle" font-size="12" fill="#2c3e50">Endothelial Activation</text>

    <!-- Arrow -->
    <path d="M 350 80 L 410 80" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead-small)"/>

    <!-- Step 4 -->
    <circle cx="440" cy="80" r="30" fill="#27ae60"/>
    <text x="440" y="85" text-anchor="middle" font-size="14" fill="white">4</text>
    <text x="440" y="120" text-anchor="middle" font-size="12" fill="#2c3e50">New Vessel Formation</text>
  </g>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/>
    </marker>
    <marker id="arrowhead-small" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34495e"/>
    </marker>
  </defs>
</svg>